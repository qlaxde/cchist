name: release

# Fires on any v* tag push. Creates (or updates) a GitHub release for the tag
# and attaches a statically-built binary for each supported platform plus a
# combined SHA256 checksum file.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          out="dist/cchist-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "$out" .
          sha256sum "$out" > "$out.sha256"
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cchist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/cchist-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        working-directory: dist
        run: |
          cat cchist-*.sha256 > SHA256SUMS
          rm cchist-*.sha256
          ls -la

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
